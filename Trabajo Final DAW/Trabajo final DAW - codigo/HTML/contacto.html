<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Futbolle</title>
    <link rel="stylesheet" href="../CSS/reset.css">
    <link rel="stylesheet" href="../CSS/base.css">
    <link rel="stylesheet" href="../CSS/layout.css">
    <link rel="stylesheet" href="../CSS/formularios.css">
    <link rel="stylesheet" href="../CSS/modales.css">
</head>
<body>
    <header class="cabecera">
        <div class="logo">Futbolle</div>
        <nav class="menu">
            <a href="index.html">Jugar</a>
            <a href="ranking.html">Ranking</a>
            <a href="historial.html" class="linkPrivado oculto">Historial</a>
            <a href="contacto.html">Contacto</a>
            <a href="https://github.com/Ignaco1/Trabajo_final_DAW" target="_blank" rel="noopener">GitHub</a>
            <button id="botonTema" class="botonTema">Modo oscuro</button>
            <a href="login.html" id="linkLogin" class="linkAuth">Iniciar sesion</a>
            <div id="usuarioActivo" class="usuarioActivo oculto">
                <span class="iconoUsuario">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.4c-3.3 0-9.8 1.6-9.8 4.9v2.4h19.6v-2.4c0-3.3-6.5-4.9-9.8-4.9z"/></svg>
                </span>
                <span id="nombreUsuarioActivo"></span>
                <button id="botonLogout" class="botonLogout">Salir</button>
            </div>
        </nav>
    </header>
    <main class="contenedorPrincipal">
        <section class="panelContacto">
            <h1 class="tituloSeccion">Contacto</h1>
            <p class="subtituloSeccion">Completa el formulario para enviarnos un mensaje</p>
            <div class="formularioContacto">
                <div class="grupoCampo">
                    <label for="inputContactoNombre">Nombre</label>
                    <input type="text" id="inputContactoNombre" placeholder="Tu nombre">
                    <span id="errorContactoNombre" class="mensajeError"></span>
                </div>
                <div class="grupoCampo">
                    <label for="inputContactoMail">Mail</label>
                    <input type="text" id="inputContactoMail" placeholder="tu@email.com">
                    <span id="errorContactoMail" class="mensajeError"></span>
                </div>
                <div class="grupoCampo">
                    <label for="inputContactoMensaje">Mensaje</label>
                    <textarea id="inputContactoMensaje" rows="6" placeholder="Contanos que necesitas"></textarea>
                    <span id="errorContactoMensaje" class="mensajeError"></span>
                </div>
                <button id="botonEnviarContacto" class="botonPrimario">Enviar mensaje</button>
            </div>
        </section>
    </main>
    <div id="overlayModal" class="overlayModal">
        <div id="cajaModal" class="cajaModal">
            <button id="cerrarModal" class="cerrar">&times;</button>
            <div id="tituloModal" class="titulo"></div>
            <div id="cuerpoModal" class="cuerpo"></div>
            <div id="botonesModal" class="botonesAccion"></div>
        </div>
    </div>
    <footer class="piePagina">
        <p>Futbolle - Proyecto final DAW 2026 - Universidad Abierta Interamericana</p>
    </footer>
    <script src="../JS/config.js"></script>
    <script src="../JS/sesion.js"></script>
    <script src="../JS/header.js"></script>
    <script src="../JS/contacto.js"></script>
</body>
</html>
